server:
  port: 8080

jasypt:
  encryptor:
    password: some_salt

spring:
  redis:
    host: localhost
    port: 6379
    timeout: 10
    jedis:
      pool:
        max-idle: 10
        min-idle: 10
        max-active: 200
        max-wait: 10000

rocketmq:
  name-server: localhost:9876
  producer:
    group: my-group

zookeeper:
  address: localhost:2181
  timeout: 4000